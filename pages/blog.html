<h2>Office Hours</h2>
<div class="w-iconbox iconpos_left style_default color_primary align_left no_text"><div class="w-iconbox-icon" style="font-size:28px;"><i class="fas fa-clock"></i></div><div class="w-iconbox-meta"><p class="w-iconbox-title" style="font-size:16px;">Mon – Fri | 8:00am – 6:00pm</p></div></div><div class="w-separator size_custom" style="height:10px"></div><div class="w-iconbox iconpos_left style_default color_primary align_left no_text"><div class="w-iconbox-icon" style="font-size:28px;"><i class="fas fa-clock"></i></div><div class="w-iconbox-meta"><p class="w-iconbox-title" style="font-size:16px;">Sat – Sun | Closed</p></div></div></div></div></div></div></section><script>
(function(){
  function esc(s){return (s||'').replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c];});}
  function fmtDate(d){
    if (!d) return '';
    var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(d);
    if (!m) return d;
    var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return months[parseInt(m[2],10)-1] + ' ' + parseInt(m[3],10) + ', ' + m[1];
  }
  function stripBrandSuffix(t){ return (t||'').replace(/\s*[-–]\s*LP\s*&(?:amp;)?\s*Sons\s*Auto\s*Care.*$/i,''); }
  function cardHTML(p){
    var link = p.link || ('/' + p.slug + '/');
    var title = stripBrandSuffix(p.title);
    var excerpt = p.excerpt || '';
    var dateDisp = fmtDate(p.date);
    var esclink = esc(link), esctitle = esc(title), escexcerpt = esc(excerpt);
    return (
      '<article class="w-grid-item size_1x1 post type-post status-publish format-standard hentry category-blogs">' +
        '<div class="w-grid-item-h">' +
          '<h2 class="w-post-elm post_title usg_post_title_1 entry-title color_link_inherit">' +
            '<a href="' + esclink + '">' + esctitle + '</a>' +
          '</h2>' +
          '<div class="w-hwrapper usg_hwrapper_1 has_text_color align_none valign_top wrap">' +
            '<time class="w-post-elm post_date usg_post_date_1 entry-date published">' +
              '<i class="far fa-clock"></i>' + esc(dateDisp) +
            '</time>' +
            '<div class="w-post-elm post_taxonomy usg_post_taxonomy_1 style_simple color_link_inherit">' +
              '<i class="far fa-folder"></i>' +
              '<a class="term-4 term-blogs" href="/blog/"><span class="w-btn-label">Blogs</span></a>' +
            '</div>' +
          '</div>' +
          '<div class="w-post-elm post_content usg_post_content_1">' + escexcerpt + '</div>' +
          '<a class="w-btn us-btn-style_2 usg_btn_1" href="' + esclink + '">' +
            '<span class="w-btn-label">Read More</span>' +
          '</a>' +
        '</div>' +
      '</article>'
    );
  }
  function render(posts){
    var host = document.querySelector('.w-grid-list');
    if (!host) return;
    posts.sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); });
    host.innerHTML = posts.map(cardHTML).join('');
    var pre = document.querySelector('.w-grid-preloader');
    if (pre) pre.style.display = 'none';
  }
  fetch('/blog/posts.json', {cache: 'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(d){ render(Array.isArray(d) ? d : (d.posts || [])); })
    .catch(function(err){
      var host = document.querySelector('.w-grid-list');
      if (host) host.innerHTML = '<p style="padding:24px;color:#888;">Unable to load posts. Please try again shortly.</p>';
    });
})();
</script>
